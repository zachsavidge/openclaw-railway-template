[build]
builder = "dockerfile"
# This installs the gog binary during the build phase
prebuildCommand = "curl -sSL https://raw.githubusercontent.com/ctreminiom/gog/master/install.sh | sh"

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

[variables]
PORT = "8080"
# Ensure RAILWAY_PUBLIC_DOMAIN is available for allowedOrigins sync
